apiVersion: ssu/v1
nlu:
  shortcuts:
    bundleIdentifier: com.opnmatrx.mtrx
    intents:
    - metadata:
        name: AskTrinityIntent_0
        title: Ask Trinity
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Ask ${+applicationName} a question'
          - '{${+prefix} }Talk to Trinity in ${+applicationName}'
          - '{${+prefix} }Hey ${+applicationName}'
    - metadata:
        name: PortfolioSummaryIntent_1
        title: Check Portfolio
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Check my portfolio in ${+applicationName}'
          - '{${+prefix} }Show my ${+applicationName} balance'
          - '{${+prefix} }How is my crypto doing in ${+applicationName}'
    - metadata:
        name: SendPaymentAppIntent_2
        title: Send Crypto Payment
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Send crypto with ${+applicationName}'
          - '{${+prefix} }Pay with ${+applicationName}'
          - '{${+prefix} }Transfer ETH using ${+applicationName}'
    - metadata:
        name: CheckGasPriceIntent_3
        title: Check Gas Price
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Check gas price in ${+applicationName}'
          - '{${+prefix} }What''s the gas fee on ${+applicationName}'
    - metadata:
        name: SwapTokensIntent_4
        title: Swap Tokens
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Swap tokens in ${+applicationName}'
          - '{${+prefix} }Exchange crypto with ${+applicationName}'
    - metadata:
        name: TransactionHistoryIntent_5
        title: Transaction History
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Show my transactions in ${+applicationName}'
          - '{${+prefix} }Recent activity in ${+applicationName}'
    - metadata:
        name: +negative
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }${+standardAppShortcutNegatives}'
variables:
- name: +applicationName
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
    - MTRX
- name: TrinityPersona
  type: ssu/parameter
  definitions:
  - locale: en
    synomyms:
    - Trinity
    - Morpheus
    - Oracle
- name: PortfolioPeriod
  type: ssu/parameter
  definitions:
  - locale: en
    synomyms:
    - Today
    - This Week
    - This Month
    - This Year
    - All Time
- name: BlockchainNetwork
  type: ssu/parameter
  definitions:
  - locale: en
    synomyms:
    - Ethereum
    - Polygon
    - Arbitrum
    - Optimism
    - Base
- name: +prefix
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/prefix/en.yaml
- name: +standardAppShortcutNegatives
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/standardAppShortcutNegatives/en.yaml
